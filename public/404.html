<body>
<div>not found kek lol</div>
</body>
<script>
    const pathname = window.location.pathname;
    const pathSplit = pathname.split('/').filter((item) => Boolean(item));
    if (pathSplit.length > 1) {
        pathSplit.shift();
        const redirectPath = pathSplit.join('/')
        const newHref = window.location.href.replace(`/${redirectPath}`, `?redirectUrl=${redirectPath}`)
        window.location.replace(newHref);
    }
</script>
</html>
